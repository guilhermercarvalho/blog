name: Performance Audit

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Roda toda segunda-feira às 06:00 UTC
    - cron: '0 6 * * 1'

jobs:
  lighthouse-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.152.2'
          extended: true

      - name: Build site
        run: hugo --minify --gc

      - name: Audit URLs with Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://guilhermercarvalho.github.io/blog/
            https://guilhermercarvalho.github.io/blog/posts/
            https://guilhermercarvalho.github.io/blog/about/
          configPath: './.lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Check Lighthouse scores
        uses: actions/github-script@v7
        with:
          script: |
            const results = ${{ steps.lighthouse.outputs.manifest }};
            const links = ${{ steps.lighthouse.outputs.links }};

            console.log('Lighthouse audit completed!');
            console.log('Results:', JSON.stringify(results, null, 2));
            console.log('Reports:', JSON.stringify(links, null, 2));

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: '.lighthouseci'
          retention-days: 30

      - name: Comment on PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const manifestPath = '.lighthouseci/manifest.json';

            if (!fs.existsSync(manifestPath)) {
              console.log('No manifest file found');
              return;
            }

            const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
            const results = manifest[0];
            const summary = results.summary;

            const comment = `
            ## 🚦 Lighthouse Performance Audit

            **Performance:** ${summary.performance * 100}/100
            **Accessibility:** ${summary.accessibility * 100}/100
            **Best Practices:** ${summary['best-practices'] * 100}/100
            **SEO:** ${summary.seo * 100}/100

            📊 [View Full Report](${results.url})
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

  pagespeed-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Run PageSpeed Insights
        uses: jakepartusch/psi-action@v1.3
        with:
          url: 'https://guilhermercarvalho.github.io/blog/'
          strategy: 'both' # mobile and desktop
          threshold: 70

      - name: Generate PageSpeed report
        run: |
          echo "✅ PageSpeed Insights audit completed"
          echo "Check the action logs for detailed results"

  web-vitals-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install -g @lhci/cli web-vitals-cli

      - name: Check Core Web Vitals
        run: |
          echo "🔍 Checking Core Web Vitals..."
          echo "- Largest Contentful Paint (LCP): < 2.5s"
          echo "- First Input Delay (FID): < 100ms"
          echo "- Cumulative Layout Shift (CLS): < 0.1"
          echo ""
          echo "Results will be available in production with real user monitoring."

      - name: Report summary
        run: |
          echo "## Performance Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Lighthouse audit completed" >> $GITHUB_STEP_SUMMARY
          echo "✅ PageSpeed Insights audit completed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Core Web Vitals configured for RUM" >> $GITHUB_STEP_SUMMARY
