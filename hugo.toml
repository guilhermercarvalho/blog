baseURL = 'https://guilhermercarvalho.github.io/blog/'
title = 'Guilherme Carvalho · Blog'
theme = 'PaperMod'
languageCode = 'pt-br'
enableRobotsTXT = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[pagination]
  pagerSize = 10

[taxonomies]
  tag = "tags"
  category = "categories"

[params]
  author = "Guilherme Carvalho"
  description = "Artigos sobre desenvolvimento backend, DevOps e produtividade."

  # Links sociais (aparecem no header/footer)
  socialIcons = [
    { name = "github", url = "https://github.com/guilhermercarvalho" },
    { name = "linkedin", url = "https://linkedin.com/in/guilhermercarvalho" },
    { name = "email", url = "mailto:dev.gcarvalho@gmail.com" }
  ]

  # Funcionalidades
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false

  # Tema (auto = detecta preferência do sistema)
  defaultTheme = "auto"

  # Home info params
  [params.homeInfoParams]
    Title = "Blog"
    Content = "Bem-vindo ao meu blog! Aqui compartilho aprendizados, projetos e reflexões sobre desenvolvimento de software."

# Menu
[[menu.main]]
  name = "Home"
  url = "https://guilhermercarvalho.github.io/"
  weight = 1
[[menu.main]]
  name = "Blog"
  url = "/posts"
  weight = 2
[[menu.main]]
  name = "Sobre"
  url = "/about"
  weight = 3
[[menu.main]]
  name = "Tags"
  url = "/tags"
  weight = 4
[[menu.main]]
  name = "Buscar"
  url = "/search"
  weight = 5
