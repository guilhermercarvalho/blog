baseURL = 'https://guilhermercarvalho.github.io/blog/'
theme = 'PaperMod'
enableRobotsTXT = true

defaultContentLanguage = 'pt-br'
defaultContentLanguageInSubdir = false
disableDefaultLanguageRedirect = false

[outputs]
  home = ["HTML", "RSS", "JSON"]

[pagination]
  pagerSize = 10

[taxonomies]
  tag = "tags"
  category = "categories"

[params.assets]
  disableFingerprinting = true
  favicon = "favicon.svg"
[params.assets.style]
  disableFingerprinting = true   # instrução específica para o PaperMod não gerar hash no CSS

# --------------- Português (padrão) ---------------
[languages.pt-br]
  languageName = "Português (Brasil)"
  weight = 1
  contentDir = "content/pt"
  title = "Guilherme Carvalho · Blog"
  [languages.pt-br.params]
    author = "Guilherme Carvalho"
    description = "Artigos sobre desenvolvimento backend, DevOps e produtividade."
    ShowReadingTime = true
    ShowShareButtons = true
    ShowPostNavLinks = true
    ShowBreadCrumbs = true
    ShowCodeCopyButtons = true
    ShowToc = true
    TocOpen = false
    defaultTheme = "auto"
    displayFullLangName = true
    socialIcons = [
      { name = "github", url = "https://github.com/guilhermercarvalho" },
      { name = "linkedin", url = "https://linkedin.com/in/guilhermercarvalho" },
      { name = "email", url = "mailto:dev.gcarvalho@gmail.com" }
    ]
  [[languages.pt-br.menu.main]]
    name = "Início"
    url = "https://guilhermercarvalho.github.io/"
    weight = 1
  [[languages.pt-br.menu.main]]
    name = "Posts"
    url = "/posts"
    weight = 2
  [[languages.pt-br.menu.main]]
    name = "Sobre"
    url = "/about"
    weight = 3
  [[languages.pt-br.menu.main]]
    name = "Tags"
    url = "/tags"
    weight = 4
  [[languages.pt-br.menu.main]]
    name = "Buscar"
    url = "/search"
    weight = 5

# --------------- Inglês ---------------
[languages.en]
  languageName = "English"
  weight = 2
  contentDir = "content/en"
  title = "Guilherme Carvalho · Blog"
  [languages.en.params]
    author = "Guilherme Carvalho"
    description = "Articles about backend development, DevOps, and productivity."
    ShowReadingTime = true
    ShowShareButtons = true
    ShowPostNavLinks = true
    ShowBreadCrumbs = true
    ShowCodeCopyButtons = true
    ShowToc = true
    TocOpen = false
    defaultTheme = "auto"
    displayFullLangName = true
    socialIcons = [
      { name = "github", url = "https://github.com/guilhermercarvalho" },
      { name = "linkedin", url = "https://linkedin.com/in/guilhermercarvalho" },
      { name = "email", url = "mailto:dev.gcarvalho@gmail.com" }
    ]
  [[languages.en.menu.main]]
    name = "Home"
    url = "https://guilhermercarvalho.github.io/"
    weight = 1
  [[languages.en.menu.main]]
    name = "Posts"
    url = "/posts"
    weight = 2
  [[languages.en.menu.main]]
    name = "About"
    url = "/about"
    weight = 3
  [[languages.en.menu.main]]
    name = "Tags"
    url = "/tags"
    weight = 4
  [[languages.en.menu.main]]
    name = "Search"
    url = "/search"
    weight = 5
